<script>
const AC={'1':'#7F77DD','2':'#1D9E75','3':'#D85A30','4':'#BA7517','5':'#185FA5'};
const AN={'1':'Act 1 · Market','2':'Act 2 · Demand','3':'Act 3 · Supply','4':'Act 4 · Gap','5':'Act 5 · Zudio'};
const CW=530,CH=112,PX=6;
const VB=`0 0 ${CW} ${CH+32}`;

function rSB({l,s}){
  const n=l.length,bw=Math.floor((CW-PX*2)/n-4);
  const tots=l.map((_,i)=>s.reduce((a,r)=>a+r.d[i],0));
  const mx=Math.max(...tots);
  let o=`<svg width="100%" viewBox="${VB}">`;
  [.25,.5,.75,1].forEach(p=>{o+=`<line x1="${PX}" y1="${CH*(1-p)}" x2="${CW-PX}" y2="${CH*(1-p)}" stroke="#EEF3F8" stroke-width=".5"/>`;});
  l.forEach((lb,i)=>{const x=PX+i*(bw+4),tot=tots[i],bh=Math.round(tot/mx*CH);let yb=CH;s.forEach(r=>{const sh=Math.max(1,Math.round(r.d[i]/tot*bh));yb-=sh;o+=`<rect x="${x}" y="${yb}" width="${bw}" height="${sh}" fill="${r.c}CC" stroke="${r.c}" stroke-width=".5"/>`;});o+=`<text x="${x+bw/2}" y="${CH-bh-2}" text-anchor="middle" font-size="7" fill="#1B2B47">${tot>=1000?(tot/1000).toFixed(0)+'k':tot}</text>`;o+=`<text x="${x+bw/2}" y="${CH+10}" text-anchor="middle" font-size="7.5" fill="#8A9CB0">${lb}</text>`;});
  let lx=PX;s.forEach(r=>{o+=`<rect x="${lx}" y="${CH+19}" width="7" height="7" fill="${r.c}CC"/>`;o+=`<text x="${lx+10}" y="${CH+26}" font-size="7" fill="#6B7D96">${r.n}</text>`;lx+=r.n.length*4.8+16;});
  return o+'</svg>';
}

function rDA({l,s,ln,y2l='%'}){
  const n=l.length,bw=Math.floor((CW-PX*2)/n-4);
  const tots=l.map((_,i)=>s.reduce((a,r)=>a+r.d[i],0));
  const mx=Math.max(...tots),lmx=Math.max(...ln)*1.25;
  let o=`<svg width="100%" viewBox="${VB}">`;
  [.25,.5,.75,1].forEach(p=>{o+=`<line x1="${PX}" y1="${CH*(1-p)}" x2="${CW-PX}" y2="${CH*(1-p)}" stroke="#EEF3F8" stroke-width=".5"/>`;});
  l.forEach((lb,i)=>{const x=PX+i*(bw+4),tot=tots[i],bh=Math.round(tot/mx*CH);let yb=CH;s.forEach(r=>{const sh=Math.max(1,Math.round(r.d[i]/tot*bh));yb-=sh;o+=`<rect x="${x}" y="${yb}" width="${bw}" height="${sh}" fill="${r.c}CC" stroke="${r.c}" stroke-width=".5"/>`;});o+=`<text x="${x+bw/2}" y="${CH+10}" text-anchor="middle" font-size="7.5" fill="#8A9CB0">${lb}</text>`;});
  const lpts=ln.map((v,i)=>({x:PX+i*(bw+4)+bw/2,y:Math.round((1-v/lmx)*CH),v}));
  o+=`<polyline points="${lpts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="#1B2B47" stroke-width="1.5" stroke-dasharray="4 2"/>`;
  lpts.forEach(p=>{o+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#1B2B47" stroke="#fff" stroke-width="1"/>`;o+=`<text x="${p.x}" y="${p.y-5}" text-anchor="middle" font-size="6.5" fill="#1B2B47">${p.v}${y2l}</text>`;});
  let lx=PX;s.forEach(r=>{o+=`<rect x="${lx}" y="${CH+19}" width="7" height="7" fill="${r.c}CC"/>`;o+=`<text x="${lx+10}" y="${CH+26}" font-size="7" fill="#6B7D96">${r.n}</text>`;lx+=r.n.length*4.8+16;});
  o+=`<line x1="${CW-55}" y1="${CH+22}" x2="${CW-40}" y2="${CH+22}" stroke="#1B2B47" stroke-width="1.5" stroke-dasharray="4 2"/><text x="${CW-36}" y="${CH+26}" font-size="7" fill="#1B2B47">${y2l}</text>`;
  return o+'</svg>';
}

function rHB({l,d,c='#7F77DD',u='',ref=null}){
  const n=l.length,rh=Math.min(16,Math.floor(CH/n)-1),mx=Math.max(...d),W=CW-120-55;
  let o=`<svg width="100%" viewBox="${VB}">`;
  l.forEach((lb,i)=>{const y=i*(rh+2)+2,bw=Math.round(d[i]/mx*W);o+=`<text x="115" y="${y+rh/2+3}" text-anchor="end" font-size="7.5" fill="#1B2B47">${lb}</text>`;o+=`<rect x="118" y="${y}" width="${bw}" height="${rh}" fill="${c}CC"/>`;if(ref&&ref[i]){const rx=118+Math.round(ref[i]/mx*W);o+=`<rect x="${rx-1}" y="${y-2}" width="2" height="${rh+4}" fill="#D85A30"/>`;}o+=`<text x="${118+bw+3}" y="${y+rh/2+3}" font-size="7.5" fill="#6B7D96">${d[i].toLocaleString()}${u}</text>`;});
  return o+'</svg>';
}

function rGB({l,g}){
  const n=l.length,gw=Math.floor((CW-PX*2)/n),bw=Math.max(3,Math.floor(gw/g.length)-3),mx=Math.max(...g.flatMap(r=>r.d));
  let o=`<svg width="100%" viewBox="${VB}">`;
  [.25,.5,.75,1].forEach(p=>{o+=`<line x1="${PX}" y1="${CH*(1-p)}" x2="${CW-PX}" y2="${CH*(1-p)}" stroke="#EEF3F8" stroke-width=".5"/>`;});
  l.forEach((lb,i)=>{const gx=PX+i*gw;g.forEach((r,j)=>{const x=gx+j*(bw+2),bh=Math.max(1,Math.round(r.d[i]/mx*CH));o+=`<rect x="${x}" y="${CH-bh}" width="${bw}" height="${bh}" fill="${r.c}CC" stroke="${r.c}" stroke-width=".5"/>`;});o+=`<text x="${gx+gw/2}" y="${CH+10}" text-anchor="middle" font-size="7.5" fill="#8A9CB0">${lb}</text>`;});
  let lx=PX;g.forEach(r=>{o+=`<rect x="${lx}" y="${CH+19}" width="7" height="7" fill="${r.c}CC"/>`;o+=`<text x="${lx+10}" y="${CH+26}" font-size="7" fill="#6B7D96">${r.n}</text>`;lx+=r.n.length*4.8+16;});
  return o+'</svg>';
}

function rWF({l,d,base=0}){
  const n=l.length,bw=Math.floor((CW-PX*2)/n-4);
  let run=base,pts=d.map(v=>{const b=run;run+=v;return{v,b};});
  const mx=Math.max(...pts.map(p=>Math.max(p.b,p.b+p.v)))*1.05||1;
  let o=`<svg width="100%" viewBox="${VB}">`;
  [.25,.5,.75,1].forEach(p=>{o+=`<line x1="${PX}" y1="${CH*(1-p)}" x2="${CW-PX}" y2="${CH*(1-p)}" stroke="#EEF3F8" stroke-width=".5"/>`;});
  pts.forEach(({v,b},i)=>{
    const x=PX+i*(bw+4),by=Math.round(b/mx*CH),sh=Math.max(2,Math.abs(Math.round(v/mx*CH)));
    const y=v>=0?CH-by-sh:CH-by;
    const cv=i===0?'#7F77DD':i===n-1?'#185FA5':v>=0?'#1D9E75':'#D85A30';
    o+=`<rect x="${x}" y="${y}" width="${bw}" height="${sh}" fill="${cv}CC" stroke="${cv}" stroke-width=".5"/>`;
    const tv=Math.abs(v)>=1000?(v>=0?'+':'−')+Math.round(Math.abs(v)/1000)+'k':(v>0?'+':'')+v.toLocaleString();
    o+=`<text x="${x+bw/2}" y="${v>=0?y-2:y+sh+9}" text-anchor="middle" font-size="6.5" fill="#1B2B47">${tv}</text>`;
    o+=`<text x="${x+bw/2}" y="${CH+10}" text-anchor="middle" font-size="7" fill="#8A9CB0">${l[i]}</text>`;
    if(i<n-1){const nx=x+bw+4,topY=v>=0?y:CH-by;o+=`<line x1="${x+bw}" y1="${topY}" x2="${nx}" y2="${topY}" stroke="#CDD8E0" stroke-width=".5" stroke-dasharray="2 1"/>`;}
  });
  return o+'</svg>';
}

function rSC({pts,xl='',yl=''}){
  const xmx=Math.max(...pts.map(p=>p.x))*1.12,ymx=Math.max(...pts.map(p=>p.y))*1.15,LB=32;
  let o=`<svg width="100%" viewBox="${VB}">`;
  o+=`<line x1="${LB}" y1="2" x2="${LB}" y2="${CH}" stroke="#DDE8F0" stroke-width=".5"/>`;
  o+=`<line x1="${LB}" y1="${CH}" x2="${CW-PX}" y2="${CH}" stroke="#DDE8F0" stroke-width=".5"/>`;
  if(yl)o+=`<text x="7" y="${CH/2}" text-anchor="middle" font-size="6.5" fill="#8A9CB0" transform="rotate(-90,7,${CH/2})">${yl}</text>`;
  if(xl)o+=`<text x="${(CW+LB)/2}" y="${CH+18}" text-anchor="middle" font-size="7" fill="#8A9CB0">${xl}</text>`;
  pts.forEach(p=>{const cx=LB+Math.round(p.x/xmx*(CW-LB-PX)),cy=Math.round((1-p.y/ymx)*CH),r=p.r?Math.max(3,p.r):5;o+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${p.c||'#7F77DD'}99" stroke="${p.c||'#7F77DD'}" stroke-width="1"/>`;if(p.n)o+=`<text x="${cx}" y="${cy-r-2}" text-anchor="middle" font-size="6.5" fill="#1B2B47">${p.n}</text>`;});
  return o+'</svg>';
}

function rHM({r,c,v}){
  const mx=Math.max(...v.flat()),mn=Math.min(...v.flat());
  const gc=val=>{const p=(val-mn)/(mx-mn||1);return`rgb(${Math.round(220-p*130)},${Math.round(235-p*155)},${Math.round(248-p*100)})`;};
  let t=`<div style="overflow:auto;max-height:130px"><table style="border-collapse:collapse;width:100%;font-size:7.5px;table-layout:fixed"><thead><tr><td style="width:85px"></td>${c.map(ci=>`<th style="padding:2px 3px;color:#6B7D96;font-weight:500;text-align:center;overflow:hidden">${ci}</th>`).join('')}</tr></thead><tbody>`;
  r.forEach((ri,i)=>{t+=`<tr><td style="padding:2px 5px;color:#1B2B47;font-weight:500;text-align:right;white-space:nowrap">${ri}</td>${v[i].map(val=>`<td style="padding:3px;text-align:center;color:#1B2B47;background:${gc(val)}">${val.toLocaleString()}</td>`).join('')}</tr>`;});
  return t+`</tbody></table></div>`;
}

function rHT({h}){return h;}

const RF={sb:rSB,da:rDA,hb:rHB,gb:rGB,wf:rWF,sc:rSC,hm:rHM,ht:rHT};

{i:4,a:'1',t:"India apparel market: size, segmentation & growth FY19–FY29P",r:1,c:['da',{l:['FY19','FY24','FY26E','FY29P'],s:[{n:'Value',c:'#7F77DD',d:[2291,3541,4292,5732]},{n:'Mid-market',c:'#1D9E75',d:[1129,1677,2107,2974]},{n:'Premium',c:'#D85A30',d:[604,994,1342,2109]}],ln:[16,18,20,25],y2l:'Org%'}],s:"Demand → B5.1 table (Image 25) · Value/Mid/Premium rows × FY19/FY24/FY26E/FY29P · Organised % approx from DRHP",p:"Value = 57% of Rs.6,212 Bn market, 10.1% CAGR — simultaneously largest, fastest-growing, least-organised segment in Indian apparel"},
{i:5,a:'1',t:"Value segment deep dive: vs mid-market and premium",r:0,c:['gb',{l:['FY19','FY24','FY26E','FY29P'],g:[{n:'Value',c:'#7F77DD',d:[2291,3541,4292,5732]},{n:'Mid-market',c:'#1D9E75',d:[1129,1677,2107,2974]},{n:'Premium',c:'#D85A30',d:[604,994,1342,2109]}]}],s:"Same as slide 4 (B5.1 table) · Absolute Bn INR per year · CAGR FY24-29P: Value=10.1%, Mid=12.1%, Premium=16.2%",p:"Value is the only segment where absolute size exceeds Rs.4L Cr AND organised penetration is below 20% — largest runway, lowest competition"},
{i:6,a:'1',t:"Apparel sub-categories: CAGR vs. absolute market size",r:0,c:['sc',{pts:[{x:2688,y:11.6,r:8,n:'Western',c:'#7F77DD'},{x:1824,y:11.2,r:7,n:'Ethnic',c:'#1D9E75'},{x:750,y:11.5,r:5,n:'Innerwear',c:'#D85A30'},{x:456,y:14.2,r:4,n:'Denim',c:'#BA7517'},{x:163,y:18.3,r:3,n:'Activewear',c:'#185FA5'},{x:70,y:10.1,r:2,n:'Others',c:'#888780'}],xl:'Market size FY24 (INR Bn)',yl:'CAGR 24–29P (%)'}],s:"Demand → B5.2 table (Image 25) · FY24 size column + CAGR 24-29P column · Circle size = absolute market size",p:"Activewear is fastest (18.3% CAGR) but value-priced western wear is 20× larger in absolute wallet — Zudio's core product dominates the high-size sweet spot"},
{i:7,a:'1',t:"B&M vs. e-commerce by price segment — the offline moat",r:1,c:['gb',{l:['Value','Economy','Mid-market','Premium','Luxury'],g:[{n:'B&M %',c:'#1D9E75',d:[90,88,78,65,55]},{n:'Online %',c:'#D85A30',d:[10,12,22,35,45]}]}],s:"Demand-Supply → DRHP data (Images 41/43) · Bazaar Style / D-Mart filings for B&M vs online split by segment",p:"Value and economy apparel are 90%+ B&M — the e-commerce disruption thesis does not apply. Physical-first players hold a durable structural moat."},

{i:11,a:'1',t:"DRHP benchmarks: Bazaar Style and V-Mart validation",r:0,c:['ht',{h:`<div style="font-size:8px;color:#4A6E8A;font-weight:600;margin-bottom:5px">DRHP VALIDATION — OUR ESTIMATES VS. PUBLIC FILINGS</div><table style="border-collapse:collapse;width:100%;font-size:8.5px"><thead><tr style="background:#F0F4F8"><th style="padding:3px 8px;text-align:left;color:#1B2B47">Metric</th><th style="padding:3px 8px;text-align:center;color:#7F77DD">Bazaar Style</th><th style="padding:3px 8px;text-align:center;color:#1D9E75">V-Mart</th><th style="padding:3px 8px;text-align:center;color:#185FA5">Our analysis</th></tr></thead><tbody><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:3px 8px;color:#6B7D96">Primary geography</td><td style="padding:3px 8px;text-align:center">T3–T5 cities</td><td style="padding:3px 8px;text-align:center">T2–T4 cities</td><td style="padding:3px 8px;text-align:center">All India</td></tr><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:3px 8px;color:#6B7D96">Organised penetration cited</td><td style="padding:3px 8px;text-align:center">~10–12%</td><td style="padding:3px 8px;text-align:center">~13–15%</td><td style="padding:3px 8px;text-align:center;font-weight:600;color:#1B2B47">~15%</td></tr><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:3px 8px;color:#6B7D96">Value segment share</td><td style="padding:3px 8px;text-align:center">55–58%</td><td style="padding:3px 8px;text-align:center">55–58%</td><td style="padding:3px 8px;text-align:center;font-weight:600;color:#1B2B47">57%</td></tr><tr><td style="padding:3px 8px;color:#6B7D96">Revenue per store Cr</td><td style="padding:3px 8px;text-align:center">Rs.3–5 Cr</td><td style="padding:3px 8px;text-align:center">Rs.4–6 Cr</td><td style="padding:3px 8px;text-align:center;color:#6B7D96">benchmarked</td></tr></tbody></table><div style="font-size:7.5px;color:#9AAABB;margin-top:5px">Sources: Bazaar Style Retail Ltd DRHP · V-Mart Retail Ltd DRHP · Our proprietary analysis</div>`}],s:"Demand-Supply → DRHP data sheet (Images 41/43) · Bazaar Style and V-Mart cited statistics on organised penetration, market share, and tier focus",p:"Both listed DRHP benchmarks independently validate our ~15% organised penetration estimate — our bottom-up methodology aligns with independently disclosed data"},
{i:12,a:'2',t:"Our methodology: 19,694 pincodes, GSDP-adjusted MPCE",r:1,c:['ht',{h:`<div style="display:flex;gap:5px;height:100%;align-items:stretch"><div style="flex:1;border:.5px solid #EDF2F8;border-radius:4px;padding:7px;display:flex;flex-direction:column;gap:3px"><div style="font-size:7.5px;font-weight:600;color:#7F77DD">STEP 1 · POPULATION</div><div style="font-size:8px;color:#6B7D96">19,694 pincodes from Pincode DB · Each mapped to District, State, Tier · Population from Census</div></div><div style="font-size:14px;color:#DDE8F0;align-self:center">→</div><div style="flex:1;border:.5px solid #EDF2F8;border-radius:4px;padding:7px"><div style="font-size:7.5px;font-weight:600;color:#1D9E75">STEP 2 · GSDP-ADJ MPCE</div><div style="font-size:8px;color:#6B7D96">State MPCE × (GSDP per capita / State avg) · Adjusts for intra-state income variation · Image 2 formula: U9=T9×J9</div></div><div style="font-size:14px;color:#DDE8F0;align-self:center">→</div><div style="flex:1;border:.5px solid #EDF2F8;border-radius:4px;padding:7px"><div style="font-size:7.5px;font-weight:600;color:#D85A30">STEP 3 · CATEGORY SHARE</div><div style="font-size:8px;color:#6B7D96">Apparel % of MPCE (5.02–6.2%) and Footwear % (0.76–1.05%) · Varies by year and tier</div></div><div style="font-size:14px;color:#DDE8F0;align-self:center">→</div><div style="flex:1;border:.5px solid #EDF2F8;border-radius:4px;padding:7px"><div style="font-size:7.5px;font-weight:600;color:#185FA5">OUTPUT · WALLET</div><div style="font-size:8px;color:#6B7D96">Apparel + footwear wallet per pincode in Cr · Sum across 19,694 pincodes = Rs.8,67,765 Cr total</div></div></div>`}],s:"Pincode DB → Mastersheet (Image 18) · Demand → MPCE sheet (Image 2) for state MPCE and GSDP adjustment · Formula: Apparel wallet = Population × GSDP-adj MPCE × Apparel %",p:"India's apparel wallet built ground-up from 19,694 pincodes with GSDP-adjusted MPCE — not from any market research report. This is the analytical differentiator that justifies every number in this deck."},
{i:13,a:'2',t:"GSDP-adjusted MPCE: where the correction is most material",r:0,c:['sc',{pts:[{x:6200,y:6700,r:5,n:'Gujarat',c:'#1D9E75'},{x:6200,y:6200,r:5,n:'MH',c:'#7F77DD'},{x:4800,y:4500,r:4,n:'Bihar',c:'#D85A30'},{x:5100,y:4800,r:4,n:'UP',c:'#BA7517'},{x:7200,y:7100,r:5,n:'TN',c:'#185FA5'},{x:6900,y:6800,r:5,n:'KA',c:'#1D9E75'},{x:5500,y:5400,r:4,n:'RJ',c:'#888780'}],xl:'Raw state MPCE (Rs/month)',yl:'GSDP-adj MPCE'}],s:"Demand → MPCE sheet (Image 2) · Raw MPCE column and GSDP-adjusted MPCE column per state · Above diagonal = adjustment increases wallet; below = decreases",p:"GSDP adjustment increases Gujarat/Maharashtra wallet 8–10% and reduces UP/Bihar — the refinement materially changes state-level wallet rankings and pincode scores"},
{i:14,a:'2',t:"The Rs.8.68 lakh crore wallet: our ground-up build",r:1,c:['wf',{l:['Urban\nApparel','Rural\nApparel','Urban\nFootwear','Rural\nFootwear','Total\nWallet'],d:[455000,268000,96000,49000,867765],base:0}],s:"Demand → Stores and Wallet sheet · Top row sum = 867,765 Cr (Image 1 cell F2 = 867765.6041) · Apparel total = 723,060 Cr, Footwear = 144,705 Cr (Image 18 subtotal row) · Urban/rural split from Pincode DB classification — verify actuals",p:"India's total apparel + footwear wallet is Rs.8.68 lakh crore. Built pincode-by-pincode. No NSSO report. No Technopak estimate. Our number."},
{i:15,a:'2',t:"Wallet geography: apparel vs footwear, urban vs rural",r:0,c:['ht',{h:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;height:100%"><div><div style="font-size:7.5px;font-weight:600;color:#7F77DD;margin-bottom:5px">APPAREL VS FOOTWEAR</div><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><div style="height:26px;background:#7F77DDCC;flex:83;display:flex;align-items:center;padding:0 6px"><span style="font-size:7.5px;color:#fff;font-weight:600">Apparel 83%</span></div><span style="font-size:8px;color:#6B7D96">Rs.7.23L Cr</span></div><div style="display:flex;align-items:center;gap:5px"><div style="height:14px;background:#1D9E75CC;flex:17;display:flex;align-items:center;padding:0 5px"><span style="font-size:7px;color:#fff">17%</span></div><span style="font-size:8px;color:#6B7D96">Rs.1.44L Cr</span></div></div><div><div style="font-size:7.5px;font-weight:600;color:#1D9E75;margin-bottom:5px">URBAN VS RURAL</div><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><div style="height:22px;background:#185FA5CC;flex:63;display:flex;align-items:center;padding:0 6px"><span style="font-size:7.5px;color:#fff;font-weight:600">Urban 63%</span></div><span style="font-size:8px;color:#6B7D96">Rs.5.47L Cr</span></div><div style="display:flex;align-items:center;gap:5px"><div style="height:14px;background:#BA7517CC;flex:37;display:flex;align-items:center;padding:0 5px"><span style="font-size:7.5px;color:#fff">Rural 37%</span></div><span style="font-size:8px;color:#6B7D96">Rs.3.21L Cr</span></div></div><div style="grid-column:1/-1;font-size:7.5px;color:#9AAABB;border-top:.5px solid #EEF3F8;padding-top:5px">Apparel 83%/footwear 17% from wallet model totals · Verify urban/rural split from Pincode DB city classification</div></div>`}],s:"Demand → total rows: Apparel = Rs.7,23,060 Cr (867765-144705), Footwear = 144,705 Cr (Image 18 subtotal) · Urban = sum of pincodes classified as city; Rural = remainder",p:"Apparel is 83% of total wallet; urban India generates 63% of wallet at only 35% of population — urban consumers punch far above their demographic weight"},
{i:16,a:'2',t:"The tier pyramid inversion: demand vs. organised stores",r:1,c:['gb',{l:['Metro','T1','T2','T3','T4','Rural'],g:[{n:'Wallet %',c:'#1D9E75',d:[22,19,20,18,14,7]},{n:'Organised stores %',c:'#D85A30',d:[36,20,18,13,9,4]}]}],s:"City Level sheet → Sum wallet by tier → Wallet % of India total · Supply → Brand Summary → Sum stores by tier → Store % of India total · Image 45 shows tier-wise table with both metrics — verify exact numbers",p:"Metro has 36% of organised stores but only 22% of wallet. T3+T4 have 32% of wallet but only 22% of stores. This mismatch is the entire demand-supply thesis in a single chart."},
{i:17,a:'2',t:"Wallet per capita by tier: the T2/T3 sweet spot",r:1,c:['sc',{pts:[{x:5200,y:120,r:8,n:'Metro',c:'#7F77DD'},{x:4100,y:185,r:10,n:'T1',c:'#1D9E75'},{x:3700,y:300,r:13,n:'T2',c:'#185FA5'},{x:2900,y:430,r:15,n:'T3',c:'#BA7517'},{x:2100,y:500,r:13,n:'T4',c:'#D85A30'},{x:1400,y:650,r:11,n:'Rural',c:'#888780'}],xl:'Wallet per capita (Rs/year)',yl:'Population (Mn)'}],s:"City Level sheet → Total wallet per tier ÷ Population per tier = per capita · Population from Pincode DB tier aggregation · Bubble size = total absolute wallet (per-capita × population)",p:"T2 cities have ~71% of Metro per-capita wallet but hold 2.5× Metro's population. T3 adds another massive base. The value format travels profitably across this entire range."},
{i:18,a:'2',t:"Pincode wallet distribution: histogram by bracket",r:0,c:['hb',{l:['0–12 Cr','12–26 Cr','26–54 Cr','54–97 Cr','97–283 Cr','283 Cr+'],d:[4823,4912,4894,2954,1576,394],c:'#1D9E75'}],s:"Pincode DB → Mastersheet → Wallet column → Bin by: 0–12, 12–26, 26–54, 54–97, 97–283, 283+ · P25=11.49, P50=26.38, P75=52.70, P90=96.84 (Image 4) define natural bin edges",p:"Median pincode wallet = Rs.26 Cr but 5,000+ pincodes sit in Rs.54–97 Cr range where Zudio breaks even. The opportunity lives in the long tail of Indian pincodes, not the top 50 cities."},
{i:19,a:'2',t:"Top 20 cities ranked by apparel + footwear wallet",r:0,c:['hb',{l:['NCR','Mumbai','Bangalore','Chennai','Hyderabad','Pune','Ahmedabad','Kolkata','Surat','Jaipur','Lucknow','Kanpur','Nagpur','Indore','Bhopal','Agra','Vadodara','Ludhiana','Patna','Kochi'],d:[46478,38200,14100,13800,13200,12600,11500,10700,8500,7200,6900,6600,5900,5300,4900,4500,4200,4000,3800,3600],c:'#7F77DD',u:' Cr'}],s:"Demand → City Master sheet → Total apparel+footwear wallet per city → Sort descending → Top 20 · NCR = 46,478 Cr visible in Image 5 · Other city values approximate — replace with actual from City Master",p:"NCR alone exceeds the next 3 cities combined. But cities 6–20 collectively represent Rs.1 lakh crore+ of wallet. The opportunity is not a top-5 story — it is a deep bench."},
{i:20,a:'2',t:"State-wise wallet: choropleth map of India",r:1,c:['ht',{h:`<div style="border:.5px solid #DDE8F0;border-radius:4px;padding:10px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px"><div style="font-size:11px;font-weight:500;color:#1B2B47;text-align:center">India state-wise apparel wallet — choropleth map</div><div style="font-size:9px;color:#6B7D96;text-align:center;line-height:1.7">Build in <b>Flourish.studio → Maps → India States</b><br>Color variable: Organised penetration % (darker = underserved)<br>Bubble overlay: Total wallet in Cr (size = wallet)<br>Data from: Demand workbook → State summary (Images 26/33)</div><div style="display:flex;gap:8px;margin-top:3px"><div style="padding:3px 8px;border-radius:3px;background:#DDE8F0;font-size:8px;color:#1B2B47">Low penetration</div><div style="padding:3px 8px;border-radius:3px;background:#7F77DD44;font-size:8px;color:#1B2B47">Mid</div><div style="padding:3px 8px;border-radius:3px;background:#7F77DD;font-size:8px;color:#fff">High penetration</div></div></div>`}],s:"Images 26/27/33 → State name | Total footwear+apparel revenue (wallet) | Organised penetration % · Upload to Flourish India States template · Free at flourish.studio",p:"Maharashtra, UP, Karnataka, Tamil Nadu = ~40% of wallet but very different penetration stories. The map makes this geographic pattern unmissable."},
{i:21,a:'2',t:"State-wise wallet ranked + organised penetration overlay",r:1,c:['hb',{l:['UP','Bihar','RJ','MH','Gujarat','MP','KA','TN','WB','Haryana','Punjab','Odisha','AP','Telangana','Assam'],d:[105976,63509,56023,80723,53358,50875,49200,43200,38500,26039,23100,30288,31251,25925,24697],c:'#7F77DD',u:' Cr',ref:[9,9,10,17,13,8,20,18,12,18,19,4,13,29,6]}],s:"Demand-Supply → State analysis (Images 26/27/33) · Column: Total Footwear+Apparel Revenue per state · Red dot markers = organised penetration % (reference) · Sort by total wallet descending",p:"Negative correlation confirmed: states with largest wallets have lowest organised penetration. The states that need organised retail most are the ones that have it least."},
{i:22,a:'2',t:"MPCE deep dive: apparel share of spend by state",r:0,c:['sc',{pts:[{x:8200,y:6.2,r:5,n:'Chandigarh',c:'#7F77DD'},{x:7100,y:5.8,r:5,n:'Gujarat',c:'#1D9E75'},{x:6800,y:5.6,r:5,n:'KA',c:'#185FA5'},{x:5200,y:5.1,r:4,n:'UP',c:'#BA7517'},{x:4800,y:4.8,r:4,n:'Bihar',c:'#D85A30'},{x:6200,y:5.4,r:5,n:'MH',c:'#7F77DD'},{x:5800,y:5.0,r:4,n:'RJ',c:'#888780'}],xl:'State MPCE (Rs/month)',yl:'Apparel % of MPCE'}],s:"Demand → MPCE sheet (Image 2) · State column, MPCE column, Apparel% column · Each dot = one state · Cluster on the right = higher-income states spending more in absolute terms AND as a share",p:"Apparel share of MPCE ranges 3.8–6.5% across states. Richer states spend more absolutely AND a higher share on apparel — a double-multiplier that makes high-GSDP states even more attractive."},
{i:23,a:'3',t:"Organised apparel retail: 31,000+ stores, fragmented market",r:0,c:['ht',{h:`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;height:100%"><div style="background:#F6F9FC;border-top:3px solid #7F77DD;padding:7px"><div style="font-size:15px;font-weight:600;color:#1B2B47">31,803</div><div style="font-size:7px;color:#534AB7;font-weight:600;margin:2px 0">TOTAL ORG STORES</div><div style="font-size:7.5px;color:#6B7D96">Organised apparel+footwear stores across India (Image 12 sum row)</div></div><div style="background:#F6F9FC;border-top:3px solid #1D9E75;padding:7px"><div style="font-size:15px;font-weight:600;color:#1B2B47">100+</div><div style="font-size:7px;color:#0F6E56;font-weight:600;margin:2px 0">BRANDS TRACKED</div><div style="font-size:7.5px;color:#6B7D96">Listed and unlisted brands across all ASP segments</div></div><div style="background:#F6F9FC;border-top:3px solid #D85A30;padding:7px"><div style="font-size:15px;font-weight:600;color:#1B2B47">~35%</div><div style="font-size:7px;color:#993C1D;font-weight:600;margin:2px 0">TOP 5 STORE SHARE</div><div style="font-size:7.5px;color:#6B7D96">Top 5 brands by store count hold only ~35% of total organised stores</div></div><div style="background:#F6F9FC;border-top:3px solid #185FA5;padding:7px"><div style="font-size:15px;font-weight:600;color:#1B2B47">2</div><div style="font-size:7px;color:#0C447C;font-weight:600;margin:2px 0">VALUE NATIONAL BRANDS</div><div style="font-size:7.5px;color:#6B7D96">Only Zudio and Reliance Trends operate as national-scale value fashion chains</div></div></div>`}],s:"Supply → Brand Summary → Store count sum = 31,803 (Image 12 header) · Count unique brand rows for brand count · Top 5 concentration from store count ranking",p:"31,803 organised stores, 100+ brands — but value fashion is a two-horse national race. The market is fragmented everywhere except the segment with the largest wallet."},
{i:24,a:'3',t:"Competitive landscape: ASP × stores × revenue bubble chart",r:1,c:['sc',{pts:[{x:2,y:958,r:14,n:'Zudio',c:'#185FA5'},{x:3,y:2120,r:13,n:'Rel Trends',c:'#1D9E75'},{x:3,y:1013,r:11,n:'Rel SmBaz',c:'#1D9E75'},{x:4,y:1759,r:10,n:'Bata',c:'#D85A30'},{x:4,y:1625,r:9,n:'Campus',c:'#7F77DD'},{x:6,y:9475,r:16,n:'Raymond',c:'#888780'},{x:5,y:1333,r:9,n:'Max',c:'#BA7517'},{x:8,y:5074,r:11,n:'Formal',c:'#888780'},{x:9,y:19474,r:15,n:'Mid-mkt',c:'#D3D1C7'},{x:10,y:94,r:6,n:'Luxury',c:'#D85A30'}],xl:'ASP segment (2=Value → 10=Luxury)',yl:'Store count'}],s:"Supply → Brand Summary (Images 8/28/31/34/36) · For each brand: ASP segment (Value=2, Economy=1, Mid=5, Premium=8, Luxury=10), Total stores, Revenue · Circle size = revenue",p:"In value fashion: two national players, Rs.8.68L Cr wallet. In premium: 38 brands, Rs.2L Cr wallet. Maximum market, minimum competition — the oligopoly advantage compounds with every new store."},
{i:25,a:'3',t:"Listed vs unlisted brands: who owns the market",r:0,c:['gb',{l:['Store count','Revenue share est.','Pincodes covered'],g:[{n:'Listed brands',c:'#185FA5',d:[45,42,65]},{n:'Unlisted brands',c:'#888780',d:[55,58,35]}]}],s:"Supply → Brand Financials (Images 3/20) · Listed = brands with Revenue FY26 shown in financials sheet · Unlisted = brands with store data but no listed revenue · Revenue share estimated from rev/store × stores",p:"Unlisted players control more than half of revenue but with lower per-store productivity — the unit economics favor consolidation toward listed, professionally-managed players"},
{i:26,a:'3',t:"Tier DNA of major brands: geographic concentration",r:1,c:['ht',{h:`<div style="overflow:auto;max-height:128px"><table style="border-collapse:collapse;width:100%;font-size:8px"><thead><tr style="background:#F0F4F8"><td style="padding:3px 6px;color:#6B7D96;width:110px">Brand</td><th style="padding:3px 6px;text-align:center;color:#7F77DD">Metro</th><th style="padding:3px 6px;text-align:center;color:#1D9E75">T1</th><th style="padding:3px 6px;text-align:center;color:#D85A30">T2</th><th style="padding:3px 6px;text-align:center;color:#BA7517">T3</th><th style="padding:3px 6px;text-align:center;color:#888780">T4+</th></tr></thead><tbody><tr style="background:#EEF5FE"><td style="padding:3px 6px;font-weight:600;color:#185FA5">Zudio ★</td><td style="padding:3px 6px;text-align:center">39%</td><td style="padding:3px 6px;text-align:center">20%</td><td style="padding:3px 6px;text-align:center">19%</td><td style="padding:3px 6px;text-align:center;font-weight:600;color:#BA7517">12%</td><td style="padding:3px 6px;text-align:center;font-weight:600;color:#BA7517">10%</td></tr><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:3px 6px">Reliance Trends</td><td style="padding:3px 6px;text-align:center">35%</td><td style="padding:3px 6px;text-align:center">25%</td><td style="padding:3px 6px;text-align:center">22%</td><td style="padding:3px 6px;text-align:center">13%</td><td style="padding:3px 6px;text-align:center">5%</td></tr><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:3px 6px">Campus Shoes</td><td style="padding:3px 6px;text-align:center">24%</td><td style="padding:3px 6px;text-align:center">19%</td><td style="padding:3px 6px;text-align:center">23%</td><td style="padding:3px 6px;text-align:center">23%</td><td style="padding:3px 6px;text-align:center">11%</td></tr><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:3px 6px">Raymond</td><td style="padding:3px 6px;text-align:center">31%</td><td style="padding:3px 6px;text-align:center">54%</td><td style="padding:3px 6px;text-align:center">8%</td><td style="padding:3px 6px;text-align:center">7%</td><td style="padding:3px 6px;text-align:center">0%</td></tr><tr><td style="padding:3px 6px">Decathlon</td><td style="padding:3px 6px;text-align:center">62%</td><td style="padding:3px 6px;text-align:center">25%</td><td style="padding:3px 6px;text-align:center">10%</td><td style="padding:3px 6px;text-align:center">3%</td><td style="padding:3px 6px;text-align:center">0%</td></tr></tbody></table><div style="font-size:7px;color:#9AAABB;margin-top:4px">Approximate splits — verify from Brand Summary tier columns (Image 31) · Zudio tier data visible in Image 1 columns J/K</div></div>`}],s:"Supply → Brand Summary (Image 31) · Metro/T1/T2/T3/T4 store columns per brand → compute % of total per tier · Highlight Zudio row for contrast",p:"No national brand has deeper sub-T2 penetration than Zudio. Raymond, Decathlon, and premium brands are 50–60% Metro/T1. Zudio is the only value fashion brand systematically building T3+ presence."},
{i:27,a:'3',t:"Revenue per store: cross-brand benchmarking",r:1,c:['hb',{l:['Shoppers Stop','Westside','Lifestyle','Pantaloons','Max','Reliance Trends','Zudio','V-Mart','Bazaar Style'],d:[63,30,45,15,7,7,13,5,4],c:'#7F77DD',u:' Cr'}],s:"Supply → Brand Financials (Images 3/20) · Revenue FY26 ÷ Total Stores = Rev/store · Zudio: Rs.12,804 Cr ÷ 958 = Rs.13.4 Cr · Westside: Rs.8,604 Cr ÷ 286 = Rs.30 Cr · Image 3 shows revenue and scraped store count columns",p:"Zudio's Rs.13 Cr revenue per store is not exceptional by category standards — and that is the point. Consistent unit economics without the Metro-premium that bedevils higher-ASP brands means the model works in T3 and T4."},
{i:28,a:'3',t:"Revenue per sq.ft: format efficiency comparison",r:0,c:['hb',{l:['Westside','Shoppers Stop','Lifestyle','Pantaloons','Zudio','Max','Reliance Trends','V-Mart'],d:[11587,8900,6800,5200,7000,4200,3800,3400],c:'#185FA5',u:' Rs'}],s:"Supply → Brand Financials (Images 3/20) · Revenue FY26 ÷ Retail Area FY26 = Rev per sqft · Westside 11,587 visible in Image 3 header area · Zudio ~7,000 estimated from revenue and avg store size assumption",p:"Zudio's revenue per sq.ft is competitive with mid-market brands despite value price points — smaller ticket, higher throughput. The format is more productive than its ASP implies."},

{i:33,a:'4',t:"Grand unified: wallet vs organised revenue by tier",r:1,c:['gb',{l:['Metro','T1','T2','T3','T4','Rural','All India'],g:[{n:'Total wallet (Cr)',c:'#1D9E75',d:[190904,164893,173553,156246,121487,60688,867765]},{n:'Organised rev (Cr)',c:'#D85A30',d:[59180,37965,31223,19311,9592,3635,129906]}]}],s:"City Level sheet (Image 45/10) → Total F+A Wallet by tier and Organised Revenue by tier · India total wallet = 867,765 Cr (Image 1) · Organised total ≈ 129,906 Cr (sum or derive from 15% penetration) · This is THE key exhibit",p:"Rs.7.38 lakh crore — 85% of India's apparel wallet — flows through unorganised trade. This is the fundamental fact every other slide in this deck is built to prove and exploit."},

{i:37,a:'4',t:"State penetration: ranked divergence from India average",r:1,c:['hb',{l:['UP','MP','Bihar','Odisha','J&K','RJ','Jharkhand','WB','Gujarat','MH','Haryana','Punjab','TN','KA','Chandigarh'],d:[9,8,9,4,9,10,13,12,13,17,18,19,18,20,33],c:'#BA7517',u:'%',ref:[15,15,15,15,15,15,15,15,15,15,15,15,15,15,15]}],s:"Demand-Supply → State analysis (Images 26/33) · Percentage of Revenue from Organised Apparel Stores column · Red reference dots = India average 15% · Sort by penetration ascending (most underserved first)",p:"UP, Bihar, Rajasthan, MP — states with combined wallet of Rs.3+ lakh crore — all below 10% organised penetration. The gap is not structural. It is historical. Organised retail will fill it."},

{i:52,a:'5',t:"Sensitivity: store potential vs key assumption changes",r:0,c:['ht',{h:`<div><table style="border-collapse:collapse;width:100%;font-size:8.5px"><thead><tr style="background:#F0F4F8"><th style="padding:4px 8px;text-align:left;color:#1B2B47">Assumption</th><th style="padding:4px 8px;text-align:center;color:#D85A30">Bear (−25%)</th><th style="padding:4px 8px;text-align:center;font-weight:600;background:#EEF8F4;color:#1B2B47">Base</th><th style="padding:4px 8px;text-align:center;color:#1D9E75">Bull (+25%)</th></tr></thead><tbody><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:4px 8px;color:#6B7D96">Wallet threshold for viability</td><td style="padding:4px 8px;text-align:center">9,200</td><td style="padding:4px 8px;text-align:center;font-weight:600;background:#EEF8F4">7,522</td><td style="padding:4px 8px;text-align:center">5,800</td></tr><tr style="border-bottom:.5px solid #EEF3F8"><td style="padding:4px 8px;color:#6B7D96">MPCE adjustment factor</td><td style="padding:4px 8px;text-align:center">6,900</td><td style="padding:4px 8px;text-align:center;font-weight:600;background:#EEF8F4">7,522</td><td style="padding:4px 8px;text-align:center">8,100</td></tr><tr><td style="padding:4px 8px;color:#6B7D96">Apparel % of MPCE</td><td style="padding:4px 8px;text-align:center">7,000</td><td style="padding:4px 8px;text-align:center;font-weight:600;background:#EEF8F4">7,522</td><td style="padding:4px 8px;text-align:center">8,400</td></tr></tbody></table><div style="margin-top:8px;padding:6px 10px;background:#E1F5EE;border-radius:4px;font-size:8px;color:#085041;line-height:1.5">In all scenarios: store potential remains 6× to 9× current footprint. No plausible assumption change invalidates the core thesis. The 7,522 number is not fragile.</div></div>`}],s:"Derived from Zudio potential model · Vary key assumptions one at a time (wallet threshold, MPCE multiplier, category share) and record resulting store count · Present as tornado chart if preferred",p:"Even in the bear case (25% stricter viability threshold), Zudio still has 6,900+ store potential. Sensitivity analysis confirms: the conclusion is robust across all analyst-plausible assumptions."},
{i:53,a:'5',t:"Key conclusions and investment implications",r:1,c:['ht',{h:`<div style="display:flex;flex-direction:column;gap:5px;height:100%;justify-content:center"><div style="font-size:8px;font-weight:600;color:#4A6E8A;letter-spacing:.07em;margin-bottom:3px">5 CONCLUSIONS — INDIA VALUE FASHION ANALYSIS</div><div style="display:flex;gap:5px;align-items:flex-start"><div style="width:17px;height:17px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8.5px;color:#fff;font-weight:600">1</span></div><div style="font-size:8.5px;color:#1B2B47;line-height:1.5">India's apparel wallet is <b>Rs.8.68 lakh crore</b> at current MPCE — built bottom-up from 19,694 pincodes, independently validated by DRHP data</div></div><div style="display:flex;gap:5px;align-items:flex-start"><div style="width:17px;height:17px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8.5px;color:#fff;font-weight:600">2</span></div><div style="font-size:8.5px;color:#1B2B47;line-height:1.5"><b>85% of this wallet</b> (Rs.7.38 lakh crore) flows through unorganised trade — the opportunity is multi-decadal and structural, not cyclical</div></div><div style="display:flex;gap:5px;align-items:flex-start"><div style="width:17px;height:17px;border-radius:50%;background:#D85A30;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8.5px;color:#fff;font-weight:600">3</span></div><div style="font-size:8.5px;color:#1B2B47;line-height:1.5">Value fashion is a <b>two-horse national race</b> — maximum wallet, minimum competition. E-commerce is structurally absent from this segment.</div></div><div style="display:flex;gap:5px;align-items:flex-start"><div style="width:17px;height:17px;border-radius:50%;background:#BA7517;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8.5px;color:#fff;font-weight:600">4</span></div><div style="font-size:8.5px;color:#1B2B47;line-height:1.5">Zudio captures <b>~1.5% of India's total apparel wallet</b> today — Rs.88,723 Cr of identified runway remains at current economic levels</div></div><div style="display:flex;gap:5px;align-items:flex-start"><div style="width:17px;height:17px;border-radius:50%;background:#185FA5;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8.5px;color:#fff;font-weight:600">5</span></div><div style="font-size:8.5px;color:#1B2B47;line-height:1.5">Zudio has <b>7,522 stores of identified potential</b> — 8× current footprint — without assuming any economic growth. <i>It is not expanding fast enough.</i></div></div></div>`}],s:"No new data — synthesises findings from slides 4–52. All 5 numbers cross-reference to source exhibits. Build this slide last once all other slides are confirmed.",p:"The analysis answers the central question: Zudio is not expanding too fast. At current MPCE and GDP the market can absorb 7× more stores than today. Every year of slow expansion goes to unorganised players."},
